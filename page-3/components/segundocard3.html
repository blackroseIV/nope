<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - NOPE</title>
    
    <link rel="stylesheet" href="css/segundocard3.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<section class="services-section">
    <div class="cards-container">
        
        <!-- Card 1 -->
        <a href="https://wa.me/5511972527752?text=Oi!%20Gostaria%20de%20solicitar%20um%20orçamento%20para%20Captação%20de%20Leads%20Mensal." class="service-card">
            <div class="icon-box">
                <img src="/nope/page-3/src/Captação-de-leads-mensal.png" alt="Captação de leads mensal">
            </div>

            <h3>Captação de leads mensal</h3>

            <ul class="card-list"></ul>
            
            <div class="price-container">
                <div class="unit-price">
                    <span>+ Investimento no Meta</span>
                </div>
                <div class="price-tag">R$ 400</div>
            </div>
        </a>

        <!-- Card 2 -->
        <a href="https://wa.me/5511972527752?text=Oi!%20Gostaria%20de%20solicitar%20um%20orçamento%20para%20Captação%20de%20Imagem." class="service-card">
            <div class="icon-box">
                <img src="/nope/page-3/src/Captação-de-Imagem.png" alt="Captação de Imagem">
            </div>

            <h3>Captação de Imagem</h3>

            <ul class="card-list"></ul>
            
            <div class="price-container">
                <div class="unit-price">
                    <span>4 Horas de Captação • Edição e Slides inclusos • Passagem a combinar</span>
                </div>
                <div class="price-tag">R$ 500</div>
            </div>
        </a>

        <!-- Card 3 -->
        <a href="https://wa.me/5511972527752?text=Oi!%20Gostaria%20de%20solicitar%20um%20orçamento%20para%20Criação%20de%20Logo." class="service-card">
            <div class="icon-box">
                <img src="/nope/page-3/src/bt-logo.png" alt="Criação de Logo">
            </div>

            <h3>Criação de Logo</h3>

            <ul class="card-list"></ul>
            
            <div class="price-container">
                <div class="price-tag">1 Unidade: R$ 200</div>
            </div>
        </a>

    </div>
</section>

</body>
</html>
